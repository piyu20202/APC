# Codemagic.yaml — Appetize.io के लिए iOS Simulator Build (Flutter)
# Simulator build — Apple Developer / code signing की जरूरत नहीं.
# cybersource_inapp इसी repo में packages/cybersource_inapp के रूप में है.

workflows:
  ios-simulator-build:
    name: iOS Simulator Build for Appetize
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter dependencies
        script: |
          flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          echo "Cleaning up old pod installation..."
          rm -rf Pods Podfile.lock .symlinks/
          flutter precache --ios
          flutter build ios --config-only
          echo "Upgrading CocoaPods..."
          sudo gem install cocoapods
          echo "Updating pod repos..."
          pod repo update --verbose || pod setup
          echo "Installing pods..."
          pod install --repo-update
          cd ..
      - name: Set up PayPal config
        script: |
          if [ -z "$PAYPAL_CONFIG_JSON" ]; then
            echo "{}" > assets/paypal_config.json
          else
            echo $PAYPAL_CONFIG_JSON > assets/paypal_config.json
          fi
      - name: Build for iOS Simulator
        script: |
          flutter build ios --simulator --debug --no-codesign
      - name: Zip for Appetize
        script: |
          cd build/ios/iphonesimulator
          zip -r ios_simulator_build.zip Runner.app
    artifacts:
      - build/ios/iphonesimulator/*.zip

  ios-testing-build:
    name: iOS Testing Build with Test Credentials
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter dependencies
        script: |
          flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          echo "Cleaning up old pod installation..."
          rm -rf Pods Podfile.lock .symlinks/
          flutter precache --ios
          flutter build ios --config-only
          echo "Upgrading CocoaPods..."
          sudo gem install cocoapods
          echo "Updating pod repos..."
          pod repo update --verbose || pod setup
          echo "Installing pods..."
          pod install --repo-update
          cd ..
      - name: Set up PayPal config
        script: |
          if [ -z "$PAYPAL_CONFIG_JSON" ]; then
            echo "{}" > assets/paypal_config.json
          else
            echo $PAYPAL_CONFIG_JSON > assets/paypal_config.json
          fi
      - name: Build for iOS Simulator (Testing)
        script: |
          flutter build ios --simulator --debug --no-codesign \
            --dart-define=APP_ENV=closed \
            --dart-define=ALLOW_TEST_CREDS=true \
            --dart-define=TEST_EMAIL=vikram@vmail.in \
            --dart-define=TEST_PASSWORD=apc@2023
      - name: Zip for Appetize
        script: |
          cd build/ios/iphonesimulator
          zip -r ios_simulator_build.zip Runner.app
    artifacts:
      - build/ios/iphonesimulator/*.zip

  ios-device-testing-build:
    name: iOS Device Testing Build with Test Credentials
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials
    scripts:
      - name: Flutter dependencies
        script: |
          flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          echo "Cleaning up old pod installation..."
          rm -rf Pods Podfile.lock .symlinks/
          flutter precache --ios
          flutter build ios --config-only
          echo "Upgrading CocoaPods..."
          sudo gem install cocoapods
          echo "Updating pod repos..."
          pod repo update --verbose || pod setup
          echo "Installing pods..."
          pod install --repo-update
          cd ..
      - name: Set up PayPal config
        script: |
          if [ -z "$PAYPAL_CONFIG_JSON" ]; then
            echo "{}" > assets/paypal_config.json
          else
            echo $PAYPAL_CONFIG_JSON > assets/paypal_config.json
          fi
      - name: Build for iOS Device (Testing)
        script: |
          flutter build ios --release \
            --dart-define=APP_ENV=closed \
            --dart-define=ALLOW_TEST_CREDS=true \
            --dart-define=TEST_EMAIL=vikram@vmail.in \
            --dart-define=TEST_PASSWORD=apc@2023
    artifacts:
      - build/ios/ipa/*.ipa

  ios-testflight-build:
    name: iOS TestFlight Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.apc.automotionplus
    scripts:
      - name: Flutter dependencies
        script: |
          flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          echo "Cleaning up old pod installation..."
          rm -rf Pods Podfile.lock .symlinks/
          flutter precache --ios
          flutter build ios --config-only
          echo "Upgrading CocoaPods..."
          sudo gem install cocoapods
          echo "Updating pod repos..."
          pod repo update --verbose || pod setup
          echo "Installing pods with repo update..."
          pod install --repo-update
          cd ..
      - name: Set up PayPal config
        script: |
          # Ensure assets directory exists and write paypal_config.json from env variable
          # Add PAYPAL_CONFIG_JSON to Codemagic environment variables
          if [ -z "$PAYPAL_CONFIG_JSON" ]; then
            echo "Warning: PAYPAL_CONFIG_JSON is not set. Creating dummy file to avoid build error."
            echo "{}" > assets/paypal_config.json
          else
            echo "Creating assets/paypal_config.json from environment variable..."
            echo $PAYPAL_CONFIG_JSON > assets/paypal_config.json
          fi
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build IPA for TestFlight
        script: |
          flutter build ipa --release \
            --dart-define=APP_ENV=prod \
            --export-options-plist=ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
